<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Avocado Toast — Simple Recipes</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <header class="site-header"><div class="container"><h1>Avocado Toast</h1><nav><a href="../index.html">Home</a></nav></div></header>
  <main class="container">
    <article class="card">
      <h2>Ingredients</h2>
      <ul>
        <li>2 slices bread, toasted</li>
        <li>1 ripe avocado</li>
        <li>Salt, pepper, lemon juice</li>
        <li>Optional: chili flakes, olive oil</li>
      </ul>
      <h2>Steps</h2>
      <ol>
        <li>Mash avocado with salt, pepper, and lemon.</li>
        <li>Spread on toast, drizzle olive oil and sprinkle chili flakes.</li>
      </ol>
    </article>
  </main>
  <footer class="site-footer"><div class="container">© Simple Recipes</div></footer>
</body>
